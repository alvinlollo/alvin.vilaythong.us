name: Publish to GH Pages
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup git for gh-pages
        if: github.ref == 'refs/heads/main'
        run: |
          rm -rf built-site
          git clone --branch gh-pages --depth 1 https://github.com/alvinlollo/alvin.vilaythong.us.git built-site || (mkdir built-site && cd built-site && git init && git checkout -b gh-pages)

      - name: Setup Hugo
        run: |
          curl -L -o /tmp/hugo.tar.gz 'https://github.com/gohugoio/hugo/releases/download/v0.161.1/hugo_0.161.1_linux-amd64.tar.gz'
          tar -C ${RUNNER_TEMP} -zxvf /tmp/hugo.tar.gz hugo
      - name: Build
        run: ${RUNNER_TEMP}/hugo

      - name: Deploy
        if: github.ref == 'refs/heads/main'
        run: |
          cd built-site
          rm -rf archetypes assets config hugo.toml i18n js lib public resources themes .git* 2>/dev/null || true
          cp -R ${GITHUB_WORKSPACE}/public/* .
          git add -A
          git config user.name 'alvinlollo'
          git config user.email 'alvin.vilaythong@gmail.com'
          git commit -m 'Updated site' || echo "No changes to commit"
          git push origin gh-pages:gh-pages --force
